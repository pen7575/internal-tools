name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate config.js from secrets
        run: |
          cat > config.js << 'EOF'
          const SUPABASE_URL = '${{ secrets.SUPABASE_URL }}';
          const SUPABASE_KEY = '${{ secrets.SUPABASE_KEY }}';
          EOF

      - name: Commit config.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.js
          git diff --cached --quiet || git commit -m "chore: update config.js from secrets [skip ci]"
          git push || true
